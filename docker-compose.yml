version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: test-platform-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: test_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: Szna123456.
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10
    networks:
      - test-platform-network

  redis:
    image: redis:7-alpine
    container_name: test-platform-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      timeout: 5s
      retries: 5
    networks:
      - test-platform-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: test-platform-backend
    restart: always
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/test_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Szna123456.
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - test-platform-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: test-platform-frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - test-platform-network

volumes:
  mysql_data:
  redis_data:

networks:
  test-platform-network:
    driver: bridge
