name: E2E Tests

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Test Suite
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: test_platform
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java (for backend)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright/
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd frontend && npm ci
          cd ../e2e && npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps chromium

      - name: Initialize database
        run: |
          mysql -h 127.0.0.1 -u root -p${{ secrets.MYSQL_PASSWORD }} test_platform < backend/src/main/resources/db/schema.sql || true
          mysql -h 127.0.0.1 -u root -p${{ secrets.MYSQL_PASSWORD }} test_platform < backend/src/main/resources/db/phase2_schema.sql || true
          mysql -h 127.0.0.1 -u root -p${{ secrets.MYSQL_PASSWORD }} test_platform < backend/src/main/resources/db/alter_user.sql || true
          mysql -h 127.0.0.1 -u root -p${{ secrets.MYSQL_PASSWORD }} test_platform < backend/src/main/resources/db/alter_execution.sql || true

      - name: Build and start backend
        working-directory: ./backend
        run: |
          mvn clean package -DskipTests -q
          nohup java -jar target/*.jar --spring.profiles.active=dev > /tmp/backend.log 2>&1 &
          echo "Waiting for backend to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/api/auth/login > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            sleep 2
          done

      - name: Build and start frontend
        working-directory: ./frontend
        run: |
          npm run build
          nohup npm run preview -- --port 5173 --host > /tmp/frontend.log 2>&1 &
          echo "Waiting for frontend to start..."
          for i in {1..15}; do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready!"
              break
            fi
            sleep 2
          done

      - name: Wait for services to be ready
        run: |
          echo "Checking service health..."

          # Check MySQL
          until mysqladmin -h 127.0.0.1 -u root -pSzna123456. ping > /dev/null 2>&1; do
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "✅ MySQL is ready"

          # Check Redis
          until redis-cli -h 127.0.0.1 ping > /dev/null 2>&1; do
            echo "Waiting for Redis..."
            sleep 2
          done
          echo "✅ Redis is ready"

          # Check Backend (max 60s)
          timeout 60s bash -c 'until curl -sf http://localhost:8080/api/auth/login > /dev/null 2>&1; do sleep 2; done' || {
            echo "❌ Backend failed to start"
            cat /tmp/backend.log
            exit 1
          }
          echo "✅ Backend is ready"

          # Check Frontend (max 30s)
          timeout 30s bash -c 'until curl -sf http://localhost:5173 > /dev/null 2>&1; do sleep 2; done' || {
            echo "❌ Frontend failed to start"
            cat /tmp/frontend.log
            exit 1
          }
          echo "✅ Frontend is ready"

      - name: Run E2E tests
        id: run-tests
        working-directory: ./e2e
        continue-on-error: true
        run: |
          npx playwright test --reporter=list,html 2>&1 | tee test-output.txt

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload test screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: e2e/test-results/
          retention-days: 14

      - name: Upload trace files (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-traces
          path: e2e/test-results/**/*.zip
          retention-days: 14

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 7

      - name: Test Summary
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            echo "## ✅ All E2E Tests Passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Some Tests Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 e2e/test-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No output available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail job if tests failed
        if: steps.run-tests.outcome != 'success'
        run: exit 1
